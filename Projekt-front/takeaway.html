<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css">
  <script type="module" src="src/main.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rokkitt">
  <title>Beställ</title>
</head>

<body>
  <img src="/images/highway.webp" alt="" id="heroImg" fetchpriority="high">
  <header>
    <nav id="nav">
      <div id="logoBox">
        <img id="logo" src="/e4haket.svg">
      </div>
      <button id="menuBtn">
        <img src="/menu.svg">
      </button>
      <ul id="navLinks">
        <li><a href="contact.html">Kontakt</a></li>
        <li><a href="takeaway.html">Beställ mat</a></li>
        <li><a href="about.html">Om E4Haket</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="order">
      <h2>Beställ upphämtning</h2>
      <article id="orderContent">
        <form id="orderForm">
          <div id="dishSection">
            <div class="orderDish">
              <img src="/images/schnitzel.webp">
              <button class="addDish">Lägg till</button>
            </div>
            <div class="orderDish">
              <img src="/images/schnitzel.jpg">
              <button class="addDish">Lägg till</button>
            </div>
          </div>
          <div class="orderInputWrapper">
            <label for="name">Namn:</label>
            <input type="text" id="name" name="name">
          </div>
          <div class="orderInputWrapper">
            <label for="email">E-post:</label>
            <input type="text" name="email" id="email">
          </div>
          <div class="orderInputWrapper">
            <label for="phone">Telefon:</label>
            <input type="text" name="phone" id="phone">
          </div>
          <div class="orderInputWrapper">
            <label for="pickup">Önskad tid:</label>
            <input type="time" name="pickup" id="pickup">
          </div>

          <div id="orderPreview">

          </div>
          <button id="orderBtn">Beställ</button>
        </form>
      </article>
    </section>
  </main>
  <footer id="footer">
    <ul id="footerNav">
      <li><a href="index.html">Startsida</a></li>
      <li><a href="#"><img src="/arrowUp.svg"></a></li>
      <li><a href="contact.html">Kontakt</a></li>
    </ul>
  </footer>
</body>

</html>
