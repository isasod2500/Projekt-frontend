<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="src/review.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rokkitt">
  <link rel="stylesheet" href="src/style.css">
  <title>Recension</title>
</head>

<body>
  <img src="/images/highway.webp" alt="" id="heroImg" fetchpriority="high">
  <header>
    <nav id="nav">
      <div id="logoBox">
        <img id="logo" src="/e4haket.svg">
      </div>
      <button id="menuBtn">
        <img src="/menu.svg">
      </button>
      <ul id="navLinks">
        <li><a href="index.html">Startsida</a></li>
        <li><a href="takeaway.html">Beställ mat</a></li>
        <li><a href="about.html">Om E4Haket</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="review">
      <h2>Lämna recension</h2>
      <article id="reviewContent">
        <form id="reviewForm">
          <ul id="errorList">

          </ul>
          <div class="reviewInputWrapper">
            <label for="name">Namn</label>
            <input type="text" id="name" name="name">
          </div>
          <div class="reviewInputWrapper">
            <label for="email">E-post</label>
            <input type="text" name="email" id="email">
          </div>
          <div class="ratingInputWrapper">
            <label for="rating">Betyg</label>
            <select name="rating" id="rating">
              <option value=""> -- Vänligen välj ett betyg --</option>
              <option value="1">1 - Missnöjd</option>
              <option value="2">2 - Förbättringar behövs</option>
              <option value="3">3 - Det var okej</option>
              <option value="4">4 - Bra, jag blev nöjd!</option>
              <option value="5">5 - Fantastiskt, inga klagomål!</option>
            </select>
          </div>

          <div class="reviewTextarea">
            <label for="reviewMsg">Meddelande:</label>
            <textarea name="reviewMsg" id="reviewMsg"></textarea>
          </div>

          <div class="reviewCheckBox">
            <legend>Får vi kontakta dig på ovan angiven E-post gällande din recension?</legend>
            <div id="input">
              <label for="checkBox">Ja</label>
              <input type="checkbox" id="checkBox" name="checkBox">
            </div>
          </div>

          <p id="success"></p>
          <button id="reviewBtn">Skicka recension</button>

          <p>Informationen behandlas enligt vår <a href="integrity.html">integritetspolicy</a></p>
        </form>
      </article>
    </section>
  </main>
  <footer id="footer">
    <ul id="footerNav">
      <li><a href="index.html">Startsida</a></li>
      <li><a href="#"><img src="/arrowUp.svg"></a></li>
      <li><a href="contact.html">Kontakt</a></li>
    </ul>
  </footer>
</body>

</html>
